version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: campaignpilot-postgres
    environment:
      POSTGRES_USER: cp_user
      POSTGRES_PASSWORD: cp_password
      POSTGRES_DB: campaignpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cp_user -d campaignpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - campaignpilot-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: campaignpilot-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    restart: unless-stopped
    networks:
      - campaignpilot-network

  n8n:
    image: n8nio/n8n:latest
    container_name: campaignpilot-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "false"
      N8N_SECURE_COOKIE: "false"
      DB_TYPE: postgres
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: cp_user
      DB_POSTGRESDB_PASSWORD: cp_password
      DB_POSTGRESDB_DATABASE: campaignpilot
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - campaignpilot-network

  langfuse-db:
    image: postgres:16
    container_name: campaignpilot-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    ports:
      - "5433:5432"
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - campaignpilot-network

  langfuse:
    image: langfuse/langfuse:2
    container_name: campaignpilot-langfuse
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: campaignpilot-langfuse-secret
      SALT: campaignpilot-langfuse-salt
    depends_on:
      langfuse-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - campaignpilot-network

volumes:
  postgres_data:
  chroma_data:
  n8n_data:
  langfuse_db_data:

networks:
  campaignpilot-network:
    driver: bridge
